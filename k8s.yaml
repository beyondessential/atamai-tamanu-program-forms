apiVersion: v1
kind: Namespace
metadata:
  name: atamai-tamanu-program-forms

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: atamai-tamanu-program-forms
type: Opaque
# Populate with: kubectl create secret generic app-secrets --from-env-file=.env -n atamai-tamanu-program-forms
# Or base64-encode values and add them here:
# data:
#   ANTHROPIC_API_KEY: <base64-encoded-value>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atamai-tamanu-program-forms
  namespace: atamai-tamanu-program-forms
  labels:
    app: atamai-tamanu-program-forms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atamai-tamanu-program-forms
  template:
    metadata:
      labels:
        app: atamai-tamanu-program-forms
    spec:
      containers:
        - name: app
          image: atamai-tamanu-program-forms:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: atamai-tamanu-program-forms
  namespace: atamai-tamanu-program-forms
spec:
  selector:
    app: atamai-tamanu-program-forms
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
